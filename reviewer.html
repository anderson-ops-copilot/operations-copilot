const getFlags=(s)=>{
  if(!s||!s.ci)return[{item:"No data submitted yet",p:"high"}];
  const f=[];
  if(!s.ci.presidentName)f.push({item:"Missing president info",p:"high"});
  if(!s.ci.vpFinanceName)f.push({item:"Missing VP Finance info",p:"high"});
  if(!s.boardConfirmed)f.push({item:"Board not confirmed",p:"high"});
  if(!s.newGoals||!s.newGoals.some(g=>g.goal&&g.goal.trim()))f.push({item:"No 2026-27 goals entered",p:"high"});
  if(!s.events||!s.events.some(e=>e.name&&e.name.trim()))f.push({item:"No events entered",p:"high"});
  else{
    const evs=s.events.filter(e=>e.name&&e.name.trim());
    const ranks=evs.map(e=>e.rank).filter(Boolean);
    if(!["1","2","3"].every(r=>ranks.includes(r)))f.push({item:"Top 3 events not ranked",p:"medium"});
    const noDate=evs.filter(e=>!e.projectedDate);
    if(noDate.length>0)f.push({item:`${noDate.length} event${noDate.length>1?"s":""} missing dates`,p:"medium"});
    const noBudget=evs.filter(e=>!e.forecastedBudget);
    if(noBudget.length>0)f.push({item:`${noBudget.length} event${noBudget.length>1?"s":""} missing budgets`,p:"low"});
    const noDesc=evs.filter(e=>!e.description||e.description.trim().length<10);
    if(noDesc.length>3)f.push({item:`${noDesc.length} events lack descriptions — may need more detail`,p:"medium"});
    const shortNames=evs.filter(e=>e.name.trim().length<5);
    if(shortNames.length>0)f.push({item:`${shortNames.length} event name${shortNames.length>1?"s":""} appear incomplete`,p:"low"});
  }
  if(!s.rev||!(s.rev.lvo||s.rev.eventRevenue||s.rev.donations||s.rev.sponsorship))f.push({item:"No outside revenue entered",p:"high"});
  if(!s.dues||!Array.isArray(s.dues)||!s.dues.some(d=>d.fee&&d.count))f.push({item:"Dues structure not filled",p:"high"});
  if(!s.mem){f.push({item:"No membership data",p:"high"})}else{
    const tot=Object.values(s.mem).reduce((sum,v)=>sum+(parseInt(v)||0),0);
    if(tot===0)f.push({item:"Membership count is zero",p:"high"});
  }
  if(!s.parkerLiaison)f.push({item:"No Parker liaison assigned",p:"medium"});
  if(!s.ie||!s.ie.trim())f.push({item:"IE response missing",p:"medium"});
  if(!s.hasExtBank)f.push({item:"Account verification not answered",p:"medium"});
  if(s.newGoals){
    const vague=s.newGoals.filter(g=>g.goal&&g.goal.trim()&&g.goal.trim().length<15);
    if(vague.length>0)f.push({item:`${vague.length} goal${vague.length>1?"s":""} may be too vague`,p:"low"});
    const noMetrics=s.newGoals.filter(g=>g.goal&&g.goal.trim()&&(!g.metrics||!g.metrics.trim()));
    if(noMetrics.length>0)f.push({item:`${noMetrics.length} goal${noMetrics.length>1?"s":""} missing success metrics`,p:"medium"});
  }
  return f;
};

const getPct=(s)=>{
  if(!s||!s.ci)return 0;
  let done=0,total=10;
  if(s.ci.presidentName)done++;
  if(s.ci.vpFinanceName)done++;
  if(s.boardConfirmed)done++;
  if(s.newGoals&&s.newGoals.some(g=>g.goal&&g.goal.trim()))done++;
  if(s.rev&&(s.rev.lvo||s.rev.eventRevenue||s.rev.donations||s.rev.sponsorship))done++;
  if(s.dues&&Array.isArray(s.dues)&&s.dues.some(d=>d.fee&&d.count))done++;
  if(s.events&&s.events.some(e=>e.name&&e.name.trim()))done++;
  if(s.events){const r=s.events.map(e=>e.rank).filter(Boolean);if(["1","2","3"].every(x=>r.includes(x)))done++}
  if(s.parkerLiaison)done++;
  if(s.ie&&s.ie.trim())done++;
  return Math.round(done/total*100);
};

  if(template==="office_hours")return{

  };

  // Default: custom review feedback
  return{
    to:pres?.e||"",
    subject:`Operating Plan Review — ${name}`,
    body:`Hi ${first},\n\nThank you for working on your 2026-2027 operating plan! I've had a chance to review what you've submitted so far (${pct}% complete) and wanted to share some feedback.\n\n${high.length>0?"A few items that still need attention before we can accept the plan:\n"+high.map(f=>"• "+f.item).join("\n")+"\n\n":""}${med.length>0?"Some suggestions that would really strengthen your submission:\n"+med.map(f=>"• "+f.item).join("\n")+"\n\n":""}${state&&state.events?(() => {const evs=state.events.filter(e=>e.name&&e.name.trim());const top=evs.filter(e=>e.rank).sort((a,b)=>parseInt(a.rank)-parseInt(b.rank));return evs.length>0?`You have ${evs.length} events listed.${top.length===3?" Your Top 3: "+top.map(e=>"#"+e.rank+" "+e.name).join(", ")+".":""}\n\n`:""})():""}I really appreciate the effort you and your board are putting into this. If any of these items are unclear or you'd like to talk through them, I'm always happy to hop on a quick call or chat during office hours (April 21 & 28, 11:30am-1pm).\n\nDeadline reminder: April 24 (1st round) or May 1 (2nd round).\n\nKeep up the great work!\n\nBest,\nMallory\nVP of Operations, ASA`
  };
};

function App(){

          setClubs(filtered);
        }
        setLoading(false);
      })
      .catch(e=>{setError("Could not connect to Google Sheets. This preview works on the live GitHub Pages site.");setLoading(false)});
  },[]);

  const loadClub=async(name)=>{
    setSelected(name);setLoadingDetail(true);setView("detail");setEmailDraft(null);
    try{
      const r=await fetch(API+"?action=load&clubName="+encodeURIComponent(name),{redirect:"follow"});
      const d=await r.json();
      setDetail(d.state||null);
    }catch(e){setDetail(null)}
    setLoadingDetail(false);
  };

  const getStatus=(pct)=>pct===100?"Complete":pct>=50?"In Progress":pct>0?"Started":"Not Started";
  const getStatusColor=(pct)=>pct===100?CO.gn:pct>=50?CO.or:pct>0?CO.or:CO.rd;

  const filtered=clubs.filter(c=>{
    if(statusFilter!=="All"){
      const s=getStatus(c.completion);
      if(statusFilter==="Complete"&&s!=="Complete")return false;
      if(statusFilter==="In Progress"&&s!=="In Progress"&&s!=="Started")return false;
      if(statusFilter==="Not Started"&&s!=="Not Started")return false;
    }
    if(typeFilter!=="All"&&c.type!==typeFilter)return false;
    return true;
  });

  const sorted=[...filtered].sort((a,b)=>{
    if(sortBy==="pct_desc")return b.completion-a.completion||a.club.localeCompare(b.club);
    if(sortBy==="pct_asc")return a.completion-b.completion||a.club.localeCompare(b.club);
    if(sortBy==="alpha")return a.club.localeCompare(b.club);
    if(sortBy==="type")return(a.type||"").localeCompare(b.type||"")||a.club.localeCompare(b.club);
    if(sortBy==="flags")return(b.flags||0)-(a.flags||0)||a.club.localeCompare(b.club);
    return 0;
  });

    <div>

        {[{l:"All",v:clubs.length,c:CO.bl,f:"All"},{l:"Complete",v:complete,c:CO.gn,f:"Complete"},{l:"In Progress",v:inProgress,c:CO.or,f:"In Progress"},{l:"Not Started",v:notStarted,c:CO.rd,f:"Not Started"}].map((s,i)=>

        </select>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:12,color:CO.mu,marginRight:4}}>Batch Email:</span>
        {[{l:"Not Started Reminder",t:"not_started"},{l:"Halfway There",t:"halfway"},{l:"Deadline (1 Week)",t:"deadline_reminder"},{l:"Office Hours",t:"office_hours"}].map(m=>
          <button key={m.t} onClick={()=>{
            const recipients=sorted.filter(c=>PRES[c.club]).map(c=>{
              const email=genEmail(c.club,[],null,m.t);
              return{club:c.club,to:email.to,subject:email.subject,body:email.body};
            });
            setBatchEmails(recipients);setBatchTemplate(m.t);setView("batch");
          }} style={{padding:"6px 14px",borderRadius:8,border:"none",fontWeight:600,fontSize:11,cursor:"pointer",fontFamily:"inherit",background:"rgba(39,116,174,0.15)",color:CO.bl}}>
            {m.l} ({sorted.filter(c=>PRES[c.club]).length})
          </button>
        )}
      </div>

      <div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,overflow:"hidden",border:`1px solid ${CO.cr}`}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>
            {[{l:"Club",s:"alpha"},{l:"Type",s:"type"},{l:"%",s:"pct_desc"},{l:"Status",s:"pct_desc"},{l:"President",s:"alpha"},{l:"Events",s:"pct_desc"},{l:"Top 3",s:"pct_desc"}].map((h,i)=>
              <th key={i} style={hdr} onClick={()=>setSortBy(h.s)}>{h.l}</th>
            )}
          </tr></thead>
          <tbody>
            {sorted.map((c,i)=>{
              const pct=c.completion;const sc=getStatusColor(pct);const pres=PRES[c.club];
              return(
                <tr key={i} onClick={()=>loadClub(c.club)} style={{cursor:"pointer",background:i%2===0?"rgba(255,255,255,0.02)":"transparent",transition:"background 0.1s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="rgba(255,209,0,0.04)"}
                  onMouseLeave={e=>e.currentTarget.style.background=i%2===0?"rgba(255,255,255,0.02)":"transparent"}>
                  <td style={{...td,fontWeight:600,color:CO.wh,maxWidth:260}}>{c.club}</td>
                  <td style={{...td,fontSize:11,color:CO.mu}}>{c.type||""}</td>
                  <td style={{...td,fontWeight:700,color:sc}}>{pct}%</td>
                  <td style={td}><span style={{...pill,background:pct===100?"rgba(61,170,109,0.15)":pct>0?"rgba(232,146,13,0.15)":"rgba(217,79,79,0.15)",color:sc}}>{getStatus(pct)}</span></td>
                  <td style={{...td,fontSize:12}}>{pres?pres.n:"—"}</td>
                  <td style={{...td,fontSize:12}}>{c.events||"—"}</td>
                  <td style={{...td,fontSize:12,color:c.top3?CO.gn:CO.rd}}>{c.top3?"✓":"✗"}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {sorted.length===0&&<div style={{padding:40,textAlign:"center",color:CO.mu}}>No clubs match this filter.</div>}
      </div>
    </div>
  );

  const renderBatch=()=>(
    <div>
      <button onClick={()=>{setView("overview");setBatchEmails([]);setBatchTemplate("")}} style={{padding:"8px 16px",borderRadius:8,border:"none",background:"rgba(255,255,255,0.08)",color:CO.mu,cursor:"pointer",fontWeight:600,marginBottom:20}}>← Back</button>
      <h2 style={{margin:"0 0 4px",color:CO.wh,fontSize:18}}>Batch Email: {batchTemplate.replace(/_/g," ").replace(/\b\w/g,l=>l.toUpperCase())}</h2>
      <p style={{color:CO.mu,fontSize:13,marginBottom:20}}>{batchEmails.length} recipients from current filter ({statusFilter} / {typeFilter})</p>
      
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        <button onClick={()=>{
          const allTo=batchEmails.map(e=>e.to).join(", ");
          navigator.clipboard.writeText(allTo);
        }} style={{padding:"8px 16px",borderRadius:8,border:"none",background:CO.bl,color:CO.wh,fontWeight:700,cursor:"pointer",fontSize:12}}>Copy All Email Addresses</button>
        <button onClick={()=>{
          const body=batchEmails[0]?.body||"";
          navigator.clipboard.writeText(body);
        }} style={{padding:"8px 16px",borderRadius:8,border:"none",background:CO.gd,color:CO.nv,fontWeight:700,cursor:"pointer",fontSize:12}}>Copy Email Template</button>
      </div>
      
      <div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:20,border:`1px solid ${CO.cr}`}}>
        <p style={{fontSize:12,fontWeight:700,color:CO.gd,marginBottom:8}}>PREVIEW (first recipient):</p>
        <pre style={{fontSize:12,color:CO.lt,whiteSpace:"pre-wrap",lineHeight:1.6,fontFamily:"inherit"}}>{batchEmails[0]?.body||"No emails to preview."}</pre>
      </div>
      
      <div style={{marginTop:20}}>
        <p style={{fontSize:13,fontWeight:700,color:CO.wh,marginBottom:8}}>All Recipients:</p>
        {batchEmails.map((e,i)=>
          <div key={i} style={{padding:"6px 0",borderBottom:`1px solid ${CO.cr}`,fontSize:12,display:"flex",justifyContent:"space-between"}}>
            <span style={{color:CO.lt}}>{e.club}</span>
            <span style={{color:CO.mu}}>{e.to}</span>
          </div>
        )}
      </div>
    </div>
  );

  const renderDetail=()=>{
    if(loadingDetail)return<div style={{textAlign:"center",padding:60,color:CO.mu}}>Loading {selected}...</div>;
    const flags=getFlags(detail);
    const pres=PRES[selected];
    const pct=detail?getPct(detail):0;

    return(
      <div>
        <button onClick={()=>{setView("overview");setSelected(null);setDetail(null);setEmailDraft(null)}} style={{padding:"8px 16px",borderRadius:8,border:"none",background:"rgba(255,255,255,0.08)",color:CO.mu,cursor:"pointer",fontWeight:600,marginBottom:20}}>← Back to All Clubs</button>

        <div style={{background:`linear-gradient(135deg,${CO.nv},${CO.bl})`,borderRadius:14,padding:"24px 28px",marginBottom:20,border:`2px solid ${CO.gd}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
            <div>
              <h2 style={{margin:"0 0 4px",fontSize:22,color:CO.wh}}>{selected}</h2>
              <p style={{margin:0,color:CO.mu,fontSize:13}}>{pres?pres.n+" • "+pres.e:"No president on file"}</p>
            </div>
            <div style={{width:70,height:70,borderRadius:"50%",background:`conic-gradient(${CO.gd} ${pct*3.6}deg,rgba(255,255,255,0.1) 0deg)`,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{width:56,height:56,borderRadius:"50%",background:CO.nv,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <span style={{fontSize:16,fontWeight:800,color:CO.gd}}>{pct}%</span></div></div>
          </div>
        </div>

        <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
          <div style={{flex:"1 1 380px"}}>
            <div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"20px 24px",border:`1px solid ${CO.cr}`,marginBottom:16}}>
              <h3 style={{margin:"0 0 14px",fontSize:15,color:CO.wh}}>Flags ({flags.length})</h3>
              {flags.length===0?<p style={{color:CO.gn,fontSize:14}}>No issues — looking great!</p>:
                flags.map((f,i)=>
                  <div key={i} style={{padding:"6px 0",borderBottom:i<flags.length-1?`1px solid ${CO.cr}`:"none",display:"flex",alignItems:"center",gap:10}}>
                    <span style={flagBadge(f.p)}>{f.p.toUpperCase()}</span>
                    <span style={{fontSize:13,color:CO.lt}}>{f.item}</span>
                  </div>
                )}
            </div>

            {detail&&detail.events&&<div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"20px 24px",border:`1px solid ${CO.cr}`,marginBottom:16}}>
              <h3 style={{margin:"0 0 14px",fontSize:15,color:CO.wh}}>Events ({detail.events.filter(e=>e.name&&e.name.trim()).length})</h3>
              {detail.events.filter(e=>e.name&&e.name.trim()).map((ev,i)=>
                <div key={i} style={{padding:"6px 0",borderBottom:`1px solid ${CO.cr}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>{ev.rank&&<span style={{fontWeight:800,color:CO.gd,marginRight:8}}>#{ev.rank}</span>}
                    <span style={{fontSize:13,color:CO.wh}}>{ev.name}</span>
                    <span style={{fontSize:11,color:CO.mu,marginLeft:8}}>{ev.type}</span></div>
                  <div style={{fontSize:11,color:CO.mu,textAlign:"right"}}>{ev.projectedDate||"No date"} • {ev.forecastedBudget?"$"+ev.forecastedBudget:"No budget"}</div>
                </div>
              )}
            </div>}

            {detail&&detail.newGoals&&<div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"20px 24px",border:`1px solid ${CO.cr}`}}>
              <h3 style={{margin:"0 0 14px",fontSize:15,color:CO.wh}}>2026-27 Goals</h3>
              {detail.newGoals.filter(g=>g.goal&&g.goal.trim()).length>0?
                detail.newGoals.filter(g=>g.goal&&g.goal.trim()).map((g,i)=>
                  <div key={i} style={{padding:"8px 0",borderBottom:`1px solid ${CO.cr}`}}>
                    <span style={{fontSize:12,padding:"2px 8px",borderRadius:8,background:"rgba(39,116,174,0.15)",color:CO.bl,marginRight:8}}>{g.pillar||"No pillar"}</span>
                    <span style={{fontSize:13,color:CO.wh}}>{g.goal}</span>
                    {g.metrics&&<p style={{margin:"4px 0 0",fontSize:12,color:CO.mu}}>Metrics: {g.metrics}</p>}
                  </div>
                ):<p style={{color:CO.rd,fontSize:13}}>No goals entered yet.</p>}
            </div>}
          </div>

          <div style={{flex:"1 1 380px"}}>
            <div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"20px 24px",border:`1px solid ${CO.cr}`,marginBottom:16}}>
              <h3 style={{margin:"0 0 14px",fontSize:15,color:CO.wh}}>Send Feedback</h3>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
                {[{l:"Custom Review",t:"review"},{l:"Not Started",t:"not_started"},{l:"Halfway",t:"halfway"},{l:"Deadline",t:"deadline_reminder"},{l:"Office Hours",t:"office_hours"}].map(m=>
                  <button key={m.t} onClick={()=>setEmailDraft(genEmail(selected,flags,detail,m.t))} style={{padding:"6px 12px",borderRadius:6,border:"none",background:emailDraft&&emailDraft.subject?.includes(m.l!=="Custom Review"?m.l:"Review")?"rgba(255,209,0,0.2)":"rgba(39,116,174,0.15)",color:CO.bl,fontWeight:600,fontSize:11,cursor:"pointer"}}>{m.l}</button>
                )}
              </div>
              {emailDraft&&<div>
                <div style={{fontSize:12,color:CO.mu,marginBottom:4}}>To: <strong style={{color:CO.lt}}>{emailDraft.to}</strong></div>
                <div style={{fontSize:12,color:CO.mu,marginBottom:8}}>Subject: <strong style={{color:CO.lt}}>{emailDraft.subject}</strong></div>
                <textarea value={emailDraft.body} onChange={e=>setEmailDraft({...emailDraft,body:e.target.value})} style={{width:"100%",minHeight:280,padding:14,borderRadius:10,border:`1px solid ${CO.cr}`,background:"rgba(0,0,0,0.3)",color:CO.lt,fontSize:12,fontFamily:"inherit",resize:"vertical",lineHeight:1.6}}/>
                <div style={{display:"flex",gap:8,marginTop:8}}>
                  <button onClick={()=>navigator.clipboard.writeText(emailDraft.body)} style={{padding:"8px 16px",borderRadius:8,border:"none",background:CO.gd,color:CO.nv,fontWeight:700,cursor:"pointer",fontSize:12}}>Copy to Clipboard</button>
                  <button onClick={()=>window.open("https://mail.google.com/mail/?view=cm&to="+encodeURIComponent(emailDraft.to)+"&su="+encodeURIComponent(emailDraft.subject)+"&body="+encodeURIComponent(emailDraft.body),"_blank")} style={{padding:"8px 16px",borderRadius:8,border:"none",background:CO.bl,color:CO.wh,fontWeight:700,cursor:"pointer",fontSize:12}}>Draft in Gmail</button>
                </div>
              </div>}
            </div>

            {detail&&detail.ci&&<div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"20px 24px",border:`1px solid ${CO.cr}`,marginBottom:16}}>
              <h3 style={{margin:"0 0 14px",fontSize:15,color:CO.wh}}>Club Info</h3>
              {[["President",detail.ci.presidentName],["VP Finance",detail.ci.vpFinanceName],["Advisor",detail.ci.advisor],["Center",detail.ci.affiliatedCenter],["External Acct",detail.ci.externalBank],["Bank Balance",detail.ci.bankBalance]].map(([l,v],i)=>
                v?<p key={i} style={{fontSize:12,color:CO.lt,margin:"0 0 4px"}}><strong style={{color:CO.mu}}>{l}:</strong> {v}</p>:null
              )}
            </div>}

            {detail&&detail.parkerLiaison&&<div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"20px 24px",border:`1px solid ${CO.cr}`}}>
              <h3 style={{margin:"0 0 14px",fontSize:15,color:CO.wh}}>Parker</h3>
              <p style={{fontSize:13,color:CO.lt}}>Liaison: <strong>{detail.parkerLiaison}</strong></p>
              <p style={{fontSize:12,color:CO.mu,marginTop:4}}>Meeting: {detail.parkerTasks?.meeting?"✅":"❌"} • Assigned: {detail.parkerTasks?.liaison?"✅":"❌"} • Template: {detail.parkerTasks?.template?"✅":"❌"}</p>
            </div>}
          </div>
        </div>
      </div>
    );
  };

  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(170deg,${CO.nv} 0%,${CO.dn} 40%,#001820 100%)`}}>
      <div style={{background:`linear-gradient(90deg,${CO.nv},${CO.bl})`,borderBottom:`3px solid ${CO.gd}`,padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:38,height:38,background:CO.bl,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:18,color:CO.wh}}>B</div>
          <div><div style={{fontSize:15,fontWeight:700,color:CO.wh}}>VP Ops Reviewer</div>
            <div style={{fontSize:11,color:CO.gd}}>Mode B — 2026-2027</div></div></div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>{setView("overview");setSelected(null)}} style={btn(view==="overview")}>All Clubs</button>
          <button onClick={()=>{setLoading(true);fetch(API+"?action=status",{redirect:"follow"}).then(r=>r.json()).then(d=>{if(d.statuses)setClubs(d.statuses.filter(c=>!SKIP.some(s=>c.club.includes(s))).map(c=>({...c,type:c.type||CLUB_TYPES[c.club]||""})));setLoading(false)}).catch(()=>setLoading(false))}} style={btn(false)}>↻ Refresh</button>
          <button onClick={async()=>{
            const rows=[["Club","Type","Rank","Event Name","Event Type","Date","Budget","IE?","Sustainability?","Organizer"]];
            for(const c of clubs){
              try{
                const r=await fetch(API+"?action=load&clubName="+encodeURIComponent(c.club),{redirect:"follow"});
                const d=await r.json();
                if(d.state&&d.state.events){
                  for(const rank of["1","2","3"]){
                    const ev=d.state.events.find(e=>e.rank===rank);
                    if(ev)rows.push([c.club,c.type||CLUB_TYPES[c.club]||"","#"+rank,ev.name||"",ev.type||"",ev.projectedDate||"",ev.forecastedBudget||"",ev.includesIE?"Yes":"No",ev.includesSustainability?"Yes":"No",ev.eventOrganizer||""]);
                  }
                }
              }catch(e){}
            }
            const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(",")).join("\n");
            const b=new Blob([csv],{type:"text/csv"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="Top3_Events_All_Clubs.csv";a.click();URL.revokeObjectURL(u);
          }} style={btn(false)}>⬇ Top 3 CSV</button>
        </div>
      </div>

      <div style={{padding:"24px 32px",maxWidth:1200,margin:"0 auto"}}>
        {loading?<div style={{textAlign:"center",padding:60,color:CO.mu}}>Loading from Google Sheets...{error&&<p style={{marginTop:12,color:CO.or}}>{error}</p>}</div>:
          view==="overview"?renderOverview():
          view==="batch"?renderBatch():
          view==="detail"?renderDetail():null
        }
      </div>
    </div>
  );
}

</script>
</body>
</html>
