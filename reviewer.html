<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anderson Copilot — VP Ops Reviewer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Helvetica Neue',sans-serif;background:#00263A;color:#E8EEF2}
#gate{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(170deg,#003B5C 0%,#00263A 40%,#001820 100%)}
.gate-box{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:48px 40px;text-align:center;max-width:420px;width:90%}
.gate-logo{width:56px;height:56px;background:#2774AE;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:28px;color:#FFF;margin-bottom:20px}
.gate-title{font-size:22px;font-weight:800;color:#FFF;margin-bottom:6px}
.gate-sub{font-size:14px;color:#8AA4B8;margin-bottom:28px}
.gate-input{width:100%;padding:14px 18px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:#FFF;font-size:16px;font-family:inherit;outline:none;margin-bottom:16px;text-align:center}
.gate-input:focus{border-color:#2774AE}
.gate-btn{width:100%;padding:14px;border-radius:10px;border:none;background:#2774AE;color:#FFF;font-weight:700;font-size:16px;cursor:pointer;font-family:inherit}
.gate-error{color:#D94F4F;font-size:13px;margin-top:12px;display:none}
#app{display:none}
</style>
</head>
<body>
<div id="gate">
<div class="gate-box">
<div class="gate-logo">B</div>
<div class="gate-title">VP Ops Reviewer</div>
<div class="gate-sub">Mode B — Operating Plan Review Dashboard</div>
<input type="password" id="pw" class="gate-input" placeholder="Reviewer Code" onkeydown="if(event.key==='Enter')checkPw()">
<button class="gate-btn" onclick="checkPw()">Enter</button>
<div id="pw-error" class="gate-error">Incorrect code.</div>
</div>
</div>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script>
const HASH="Anderson_ASA_Operations";
function checkPw(){
  if(document.getElementById("pw").value===HASH){
    document.getElementById("gate").style.display="none";
    document.getElementById("app").style.display="block";
    ReactDOM.createRoot(document.getElementById("app")).render(React.createElement(App));
  } else { document.getElementById("pw-error").style.display="block"; }
}
</script>

<script type="text/babel">
const {useState,useEffect}=React;

const API="https://script.google.com/macros/s/AKfycbw2pOiLQZ7W3g1PNHMgbRAv1AE_KGIkk_m53Gtw7CEPwEEHl5S-J_-FsSJuUfEKsBQTRA/exec";

const PRES={"Association for Real Estate at Anderson (AREA)":{"n":"Alex Morse","e":"alex.morse.2027@anderson.ucla.edu"},"Energy and Cleantech Association (ECA)":{"n":"Brevin Vent","e":"brevin.vent.2027@anderson.ucla.edu"},"Entertainment Management Association (EMA)":{"n":"Khari Hutchings","e":"khari.hutchings.2027@anderson.ucla.edu"},"Entrepreneur Association (EA)":{"n":"Ynez Vinieris-Giancola","e":"ynez.vinieris-giancola.2027@anderson.ucla.edu"},"Healthcare Business Association (HBA)":{"n":"Natalie Doppelt","e":"natalie.doppelt.2027@anderson.ucla.edu"},"Investment Finance Association (IFA)":{"n":"Joshua Oh","e":"joshua.oh.2027@anderson.ucla.edu"},"Management Consulting Association (MCA)":{"n":"James Sidrak","e":"james.sidrak.2027@anderson.ucla.edu"},"Marketing Association (MA)":{"n":"Emily Schloss","e":"emily.schloss.2027@anderson.ucla.edu"},"Net Impact":{"n":"Gibby Kuria","e":"gibby.kuria.2027@anderson.ucla.edu"},"Sports Business Association (SBA)":{"n":"Daniela Castro-Alvarez","e":"daniela.castro-alvarez.2027@anderson.ucla.edu"},"Strategy & Operations Management Association (SOMA)":{"n":"Abimanyu Prabaswara Dharmawan","e":"abimanyu.dharmawan.2027@anderson.ucla.edu"},"Tech Business Association at Anderson (AnderTech)":{"n":"Shreya Vishwanath","e":"shreya.vishwanath.2027@anderson.ucla.edu"},"Video Game Business Association (VGBA)":{"n":"William Chen","e":"william.chen.2027@anderson.ucla.edu"},"Adam Smith Society":{"n":"Yokesh KC","e":"yokesh.kc.2027@anderson.ucla.edu"},"AnderEats":{"n":"Trennedy Kleczewski","e":"trennedy.kleczewski.2027@anderson.ucla.edu"},"John Anderson Golf Club":{"n":"Price Jarman","e":"price.jarman.2027@anderson.ucla.edu"},"Outdoor Adventure Club (OAC)":{"n":"Trenton Hall","e":"trent.hall.2027@anderson.ucla.edu"},"Soccer Club":{"n":"Sebastian Ruiz","e":"sebastian.ruiz.2027@anderson.ucla.edu"},"Tennis Club at Anderson (TCA)":{"n":"Carlos Pantin","e":"carlos.pantin.2027@anderson.ucla.edu"},"Admissions Ambassador Corps (AAC)":{"n":"Megan Belmonte","e":"megan.belmonte.2027@anderson.ucla.edu"},"Alliance for Latinx Management at Anderson (ALMA)":{"n":"Elise Tomasello","e":"elise.tomasello.2027@anderson.ucla.edu"},"Asian Management Student Association (AMSA)":{"n":"Jeff Yan","e":"jeffrey.yan.2027@anderson.ucla.edu"},"Christian Student Fellowship (CSF)":{"n":"Alexis Burns","e":"alexis.burns.2027@anderson.ucla.edu"},"European Business Association (EBA)":{"n":"Roddy Giles","e":"roddy.giles.2027@anderson.ucla.edu"},"Greater China Business Association (GCBA)":{"n":"Jack Ge","e":"jack.ge.2027@anderson.ucla.edu"},"Japan America Business Association (JABA)":{"n":"Yuka Harano","e":"yuka.harano.2027@anderson.ucla.edu"},"Korean Business Student Association (KBSA)":{"n":"Allison Lee","e":"allison.lee.2027@anderson.ucla.edu"},"Out@Anderson":{"n":"Jess Lardenoit","e":"jess.lardenoit.2027@anderson.ucla.edu"},"South Asian Business Association (SABA)":{"n":"Yash Yagnik","e":"yash.yagnik.2027@anderson.ucla.edu"},"Southeast Asian Business Association (SEABA)":{"n":"Aurora Zafira","e":"aurora.zafira.2027@anderson.ucla.edu"},"Taiwanese Student Business Association (TSBA)":{"n":"William Chen","e":"william.chen.2027@anderson.ucla.edu"}};

const CO={nv:"#003B5C",dn:"#00263A",bl:"#2774AE",gd:"#FFD100",lt:"#E8EEF2",wh:"#FFF",mu:"#8AA4B8",rd:"#D94F4F",gn:"#3DAA6D",or:"#E8920D",cr:"rgba(255,255,255,0.1)"};

function App(){
  const[clubs,setClubs]=useState([]);
  const[loading,setLoading]=useState(true);
  const[selected,setSelected]=useState(null);
  const[detail,setDetail]=useState(null);
  const[loadingDetail,setLoadingDetail]=useState(false);
  const[view,setView]=useState("overview");
  const[emailDraft,setEmailDraft]=useState("");

  useEffect(()=>{
    fetch(API+"?action=status",{redirect:"follow"})
      .then(r=>r.json())
      .then(d=>{
        if(d.statuses){
          const sorted=d.statuses.sort((a,b)=>b.completion-a.completion||a.club.localeCompare(b.club));
          setClubs(sorted);
        }
        setLoading(false);
      })
      .catch(e=>{console.error(e);setLoading(false)});
  },[]);

  const loadClub=async(name)=>{
    setSelected(name);setLoadingDetail(true);setView("detail");
    try{
      const r=await fetch(API+"?action=load&clubName="+encodeURIComponent(name),{redirect:"follow"});
      const d=await r.json();
      setDetail(d.state||null);
    }catch(e){setDetail(null)}
    setLoadingDetail(false);
  };

  const getFlags=(s)=>{
    if(!s||!s.ci)return[{item:"No data submitted",priority:"high"}];
    const f=[];
    if(!s.ci.presidentName)f.push({item:"Missing president info",priority:"high"});
    if(!s.ci.vpFinanceName)f.push({item:"Missing VP Finance info",priority:"high"});
    if(!s.boardConfirmed)f.push({item:"Board not confirmed",priority:"high"});
    if(!s.newGoals||!s.newGoals.some(g=>g.goal&&g.goal.trim()))f.push({item:"No 2026-27 goals entered",priority:"high"});
    if(!s.events||!s.events.some(e=>e.name&&e.name.trim()))f.push({item:"No events entered",priority:"high"});
    if(s.events){
      const ranks=s.events.map(e=>e.rank).filter(Boolean);
      if(!["1","2","3"].every(r=>ranks.includes(r)))f.push({item:"Top 3 events not ranked",priority:"medium"});
      const noDate=s.events.filter(e=>e.name&&e.name.trim()&&!e.projectedDate);
      if(noDate.length>0)f.push({item:noDate.length+" events missing dates",priority:"medium"});
      const noBudget=s.events.filter(e=>e.name&&e.name.trim()&&!e.forecastedBudget);
      if(noBudget.length>0)f.push({item:noBudget.length+" events missing budget",priority:"low"});
    }
    if(!s.rev||!(s.rev.lvo||s.rev.eventRevenue||s.rev.donations||s.rev.sponsorship))f.push({item:"No outside revenue entered",priority:"high"});
    if(!s.dues||!Array.isArray(s.dues)||!s.dues.some(d=>d.fee&&d.count))f.push({item:"Dues structure not filled",priority:"high"});
    if(!s.mem){f.push({item:"No membership data",priority:"high"})}else{
      const tot=Object.values(s.mem).reduce((sum,v)=>sum+(parseInt(v)||0),0);
      if(tot===0)f.push({item:"Membership count is zero",priority:"high"});
    }
    if(!s.parkerLiaison)f.push({item:"No Parker liaison assigned",priority:"medium"});
    if(!s.ie||!s.ie.trim())f.push({item:"IE response missing",priority:"medium"});
    if(!s.hasExtBank)f.push({item:"Account verification not answered",priority:"medium"});
    // Content quality checks
    if(s.newGoals){
      const vague=s.newGoals.filter(g=>g.goal&&g.goal.trim()&&g.goal.trim().length<15);
      if(vague.length>0)f.push({item:vague.length+" goals may be too vague (under 15 chars)",priority:"low"});
      const noMetrics=s.newGoals.filter(g=>g.goal&&g.goal.trim()&&(!g.metrics||!g.metrics.trim()));
      if(noMetrics.length>0)f.push({item:noMetrics.length+" goals missing metrics",priority:"medium"});
    }
    return f;
  };

  const generateEmail=(name,flags,state)=>{
    const pres=PRES[name];
    const firstName=pres?pres.n.split(" ")[0]:"President";
    const highFlags=flags.filter(f=>f.priority==="high");
    const medFlags=flags.filter(f=>f.priority==="medium");
    const completion=clubs.find(c=>c.club===name)?.completion||0;

    let email=`To: ${pres?pres.e:"[president email]"}\nSubject: Operating Plan Feedback — ${name}\n\n`;
    email+=`Hi ${firstName},\n\n`;
    email+=`Thank you for working on your 2026-2027 operating plan! I've reviewed your submission (currently at ${completion}% completion) and have some feedback.\n\n`;

    if(highFlags.length>0){
      email+=`REQUIRED — Please address these before your submission can be accepted:\n`;
      highFlags.forEach(f=>{email+=`• ${f.item}\n`});
      email+=`\n`;
    }
    if(medFlags.length>0){
      email+=`RECOMMENDED — These would strengthen your plan:\n`;
      medFlags.forEach(f=>{email+=`• ${f.item}\n`});
      email+=`\n`;
    }

    if(state&&state.events){
      const evCount=state.events.filter(e=>e.name&&e.name.trim()).length;
      email+=`You currently have ${evCount} events listed. `;
      const ranks=state.events.map(e=>e.rank).filter(Boolean);
      if(["1","2","3"].every(r=>ranks.includes(r))){
        const top=state.events.filter(e=>e.rank).sort((a,b)=>parseInt(a.rank)-parseInt(b.rank));
        email+=`Your Top 3: ${top.map(e=>"#"+e.rank+" "+e.name).join(", ")}.\n\n`;
      }else{
        email+=`Please make sure to rank your Top 3 priority events.\n\n`;
      }
    }

    email+=`Deadline reminder: Submit by April 24 (1st round) or May 1 (2nd round). `;
    email+=`Office hours are available April 21 & 28, 11:30am-1pm if you have questions.\n\n`;
    email+=`Link: https://anderson-ops-copilot.github.io/operations-copilot/\n\n`;
    email+=`Best,\nMallory Leeper\nVP of Operations, ASA`;
    return email;
  };

  const complete=clubs.filter(c=>c.completion===100).length;
  const started=clubs.filter(c=>c.completion>0&&c.completion<100).length;
  const notStarted=clubs.filter(c=>c.completion===0).length;

  const hdr={padding:"8px 12px",fontSize:11,fontWeight:700,color:CO.mu,textAlign:"left",borderBottom:`1px solid ${CO.cr}`,whiteSpace:"nowrap"};
  const cell={padding:"8px 12px",fontSize:13,borderBottom:`1px solid ${CO.cr}`};

  const renderOverview=()=>(
    <div>
      <div style={{display:"flex",gap:16,marginBottom:24,flexWrap:"wrap"}}>
        {[{l:"Total Clubs",v:clubs.length,c:CO.bl},{l:"Complete",v:complete,c:CO.gn},{l:"In Progress",v:started,c:CO.or},{l:"Not Started",v:notStarted,c:CO.rd}].map((s,i)=>
          <div key={i} style={{background:"rgba(255,255,255,0.05)",borderRadius:12,padding:"18px 24px",flex:"1 1 140px",textAlign:"center",borderLeft:`4px solid ${s.c}`}}>
            <div style={{fontSize:28,fontWeight:800,color:s.c}}>{s.v}</div>
            <div style={{fontSize:12,color:CO.mu,marginTop:4}}>{s.l}</div>
          </div>
        )}
      </div>

      <div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,overflow:"hidden",border:`1px solid ${CO.cr}`}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>
            {["Club","Type","%","Status","President","Events","Top 3","Flags"].map((h,i)=>
              <th key={i} style={hdr}>{h}</th>
            )}
          </tr></thead>
          <tbody>
            {clubs.map((c,i)=>{
              const pct=c.completion;
              const status=pct===100?"Complete":pct>=50?"In Progress":pct>0?"Started":"Not Started";
              const statusColor=pct===100?CO.gn:pct>=50?CO.or:pct>0?CO.or:CO.rd;
              const pres=PRES[c.club];
              return(
                <tr key={i} onClick={()=>loadClub(c.club)} style={{cursor:"pointer",background:i%2===0?"rgba(255,255,255,0.02)":"transparent"}}>
                  <td style={{...cell,fontWeight:600,color:CO.wh,maxWidth:280}}>{c.club}</td>
                  <td style={{...cell,fontSize:11,color:CO.mu}}>{c.type||""}</td>
                  <td style={{...cell,fontWeight:700,color:statusColor}}>{pct}%</td>
                  <td style={{...cell}}>
                    <span style={{padding:"3px 10px",borderRadius:12,fontSize:11,fontWeight:600,background:pct===100?"rgba(61,170,109,0.15)":pct>0?"rgba(232,146,13,0.15)":"rgba(217,79,79,0.15)",color:statusColor}}>{status}</span>
                  </td>
                  <td style={{...cell,fontSize:12}}>{pres?pres.n:"—"}</td>
                  <td style={{...cell,fontSize:12}}>{c.events||"—"}</td>
                  <td style={{...cell,fontSize:12,color:c.top3?"green":"#D94F4F"}}>{c.top3?"Yes":"No"}</td>
                  <td style={{...cell,fontSize:12}}>{c.flags||"—"}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );

  const renderTop3=()=>{
    const allTop3=[];
    // We'll need to load each club for this — for now show from the status data
    return(
      <div>
        <p style={{color:CO.mu,marginBottom:16}}>View all clubs' Top 3 priority events in the Google Sheets Dashboard (Tab: "Top 3 Events"). The dashboard auto-refreshes daily.</p>
        <button onClick={()=>setView("overview")} style={{padding:"10px 20px",borderRadius:8,border:"none",background:CO.bl,color:CO.wh,fontWeight:700,cursor:"pointer"}}>← Back to Overview</button>
      </div>
    );
  };

  const renderDetail=()=>{
    if(loadingDetail)return <div style={{textAlign:"center",padding:60,color:CO.mu}}>Loading {selected}...</div>;
    const flags=getFlags(detail);
    const highCount=flags.filter(f=>f.priority==="high").length;
    const medCount=flags.filter(f=>f.priority==="medium").length;
    const lowCount=flags.filter(f=>f.priority==="low").length;
    const pres=PRES[selected];
    const clubStatus=clubs.find(c=>c.club===selected);

    return(
      <div>
        <button onClick={()=>{setView("overview");setSelected(null);setDetail(null);setEmailDraft("")}} style={{padding:"8px 16px",borderRadius:8,border:"none",background:"rgba(255,255,255,0.08)",color:CO.mu,cursor:"pointer",fontWeight:600,marginBottom:20}}>← Back to All Clubs</button>

        <div style={{background:`linear-gradient(135deg,${CO.nv},${CO.bl})`,borderRadius:14,padding:"24px 28px",marginBottom:20,border:`2px solid ${CO.gd}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
            <div>
              <h2 style={{margin:"0 0 4px",fontSize:22,color:CO.wh}}>{selected}</h2>
              <p style={{margin:0,color:CO.mu,fontSize:13}}>{pres?pres.n+" • "+pres.e:"No president on file"}</p>
            </div>
            <div style={{width:70,height:70,borderRadius:"50%",background:`conic-gradient(${CO.gd} ${(clubStatus?.completion||0)*3.6}deg,rgba(255,255,255,0.1) 0deg)`,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{width:56,height:56,borderRadius:"50%",background:CO.nv,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <span style={{fontSize:16,fontWeight:800,color:CO.gd}}>{clubStatus?.completion||0}%</span>
              </div>
            </div>
          </div>
        </div>

        <div style={{display:"flex",gap:20,flexWrap:"wrap",marginBottom:20}}>
          <div style={{flex:"1 1 340px"}}>
            <div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"20px 24px",border:`1px solid ${CO.cr}`,marginBottom:16}}>
              <h3 style={{margin:"0 0 14px",fontSize:15,color:CO.wh}}>Flags ({flags.length})</h3>
              {flags.length===0?<p style={{color:CO.gn,fontSize:14}}>✅ No issues found!</p>:
              flags.map((f,i)=>
                <div key={i} style={{padding:"6px 0",borderBottom:i<flags.length-1?`1px solid ${CO.cr}`:"none",display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:10,padding:"2px 8px",borderRadius:10,fontWeight:700,
                    background:f.priority==="high"?"rgba(217,79,79,0.15)":f.priority==="medium"?"rgba(232,146,13,0.15)":"rgba(138,164,184,0.15)",
                    color:f.priority==="high"?CO.rd:f.priority==="medium"?CO.or:CO.mu
                  }}>{f.priority.toUpperCase()}</span>
                  <span style={{fontSize:13,color:CO.lt}}>{f.item}</span>
                </div>
              )}
            </div>

            {detail&&detail.events&&<div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"20px 24px",border:`1px solid ${CO.cr}`,marginBottom:16}}>
              <h3 style={{margin:"0 0 14px",fontSize:15,color:CO.wh}}>Events ({detail.events.filter(e=>e.name&&e.name.trim()).length})</h3>
              {detail.events.filter(e=>e.name&&e.name.trim()).map((ev,i)=>
                <div key={i} style={{padding:"6px 0",borderBottom:`1px solid ${CO.cr}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    {ev.rank&&<span style={{fontWeight:800,color:CO.gd,marginRight:8}}>#{ev.rank}</span>}
                    <span style={{fontSize:13,color:CO.wh}}>{ev.name}</span>
                    <span style={{fontSize:11,color:CO.mu,marginLeft:8}}>{ev.type}</span>
                  </div>
                  <div style={{fontSize:11,color:CO.mu,textAlign:"right"}}>
                    {ev.projectedDate||"No date"} • {ev.forecastedBudget?"$"+ev.forecastedBudget:"No budget"}
                  </div>
                </div>
              )}
            </div>}

            {detail&&detail.newGoals&&<div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"20px 24px",border:`1px solid ${CO.cr}`}}>
              <h3 style={{margin:"0 0 14px",fontSize:15,color:CO.wh}}>2026-27 Goals</h3>
              {detail.newGoals.filter(g=>g.goal&&g.goal.trim()).map((g,i)=>
                <div key={i} style={{padding:"8px 0",borderBottom:`1px solid ${CO.cr}`}}>
                  <span style={{fontSize:12,padding:"2px 8px",borderRadius:8,background:"rgba(39,116,174,0.15)",color:CO.bl,marginRight:8}}>{g.pillar||"No pillar"}</span>
                  <span style={{fontSize:13,color:CO.wh}}>{g.goal}</span>
                  {g.metrics&&<p style={{margin:"4px 0 0 0",fontSize:12,color:CO.mu}}>Metrics: {g.metrics}</p>}
                </div>
              )}
              {(!detail.newGoals||!detail.newGoals.some(g=>g.goal&&g.goal.trim()))&&
                <p style={{color:CO.rd,fontSize:13}}>No goals entered yet.</p>
              }
            </div>}
          </div>

          <div style={{flex:"1 1 340px"}}>
            <div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"20px 24px",border:`1px solid ${CO.cr}`,marginBottom:16}}>
              <h3 style={{margin:"0 0 14px",fontSize:15,color:CO.wh}}>Generate Feedback Email</h3>
              <button onClick={()=>setEmailDraft(generateEmail(selected,flags,detail))} style={{padding:"10px 20px",borderRadius:8,border:"none",background:CO.bl,color:CO.wh,fontWeight:700,cursor:"pointer",marginBottom:12}}>
                Generate Email for {pres?pres.n.split(" ")[0]:"President"}
              </button>
              {emailDraft&&<div>
                <textarea value={emailDraft} onChange={e=>setEmailDraft(e.target.value)} style={{width:"100%",minHeight:300,padding:14,borderRadius:10,border:`1px solid ${CO.cr}`,background:"rgba(0,0,0,0.3)",color:CO.lt,fontSize:12,fontFamily:"monospace",resize:"vertical"}}/>
                <button onClick={()=>{navigator.clipboard.writeText(emailDraft);}} style={{padding:"8px 16px",borderRadius:8,border:"none",background:CO.gd,color:CO.nv,fontWeight:700,cursor:"pointer",marginTop:8}}>Copy to Clipboard</button>
              </div>}
            </div>

            {detail&&detail.ci&&<div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"20px 24px",border:`1px solid ${CO.cr}`,marginBottom:16}}>
              <h3 style={{margin:"0 0 14px",fontSize:15,color:CO.wh}}>Club Info</h3>
              {[["President",detail.ci.presidentName],["VP Finance",detail.ci.vpFinanceName],["Advisor",detail.ci.advisor],["Center",detail.ci.affiliatedCenter],["External Bank",detail.ci.externalBank],["Bank Balance",detail.ci.bankBalance]].map(([l,v],i)=>
                v?<p key={i} style={{fontSize:12,color:CO.lt,margin:"0 0 4px"}}><strong style={{color:CO.mu}}>{l}:</strong> {v}</p>:null
              )}
            </div>}

            {detail&&detail.parkerLiaison&&<div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"20px 24px",border:`1px solid ${CO.cr}`}}>
              <h3 style={{margin:"0 0 14px",fontSize:15,color:CO.wh}}>Parker</h3>
              <p style={{fontSize:13,color:CO.lt}}>Liaison: <strong>{detail.parkerLiaison}</strong></p>
              <p style={{fontSize:12,color:CO.mu,marginTop:4}}>
                Meeting: {detail.parkerTasks?.meeting?"✅":"❌"} •
                Liaison assigned: {detail.parkerTasks?.liaison?"✅":"❌"} •
                Template agreed: {detail.parkerTasks?.template?"✅":"❌"}
              </p>
            </div>}
          </div>
        </div>
      </div>
    );
  };

  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(170deg,${CO.nv} 0%,${CO.dn} 40%,#001820 100%)`}}>
      <div style={{background:`linear-gradient(90deg,${CO.nv},${CO.bl})`,borderBottom:`3px solid ${CO.gd}`,padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:38,height:38,background:CO.bl,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:18,color:CO.wh}}>B</div>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:CO.wh}}>VP Ops Reviewer</div>
            <div style={{fontSize:11,color:CO.gd}}>Mode B — 2026-2027</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          {["overview","top3"].map(v=>
            <button key={v} onClick={()=>setView(v)} style={{padding:"6px 14px",borderRadius:6,border:"none",background:view===v?"rgba(255,209,0,0.2)":"rgba(255,255,255,0.06)",color:view===v?CO.gd:CO.mu,fontWeight:600,fontSize:12,cursor:"pointer"}}>
              {v==="overview"?"All Clubs":"Top 3 Events"}
            </button>
          )}
          <button onClick={()=>{setLoading(true);fetch(API+"?action=status",{redirect:"follow"}).then(r=>r.json()).then(d=>{if(d.statuses)setClubs(d.statuses.sort((a,b)=>b.completion-a.completion||a.club.localeCompare(b.club)));setLoading(false)})}} style={{padding:"6px 14px",borderRadius:6,border:"none",background:"rgba(255,255,255,0.06)",color:CO.mu,fontWeight:600,fontSize:12,cursor:"pointer"}}>
            ↻ Refresh
          </button>
        </div>
      </div>

      <div style={{padding:"24px 32px",maxWidth:1200,margin:"0 auto"}}>
        <h1 style={{margin:"0 0 20px",fontSize:22,fontWeight:800,color:CO.wh}}>
          {view==="overview"?"📊 Club Status Overview":view==="top3"?"🏆 Top 3 Events":"📋 "+selected}
        </h1>

        {loading?<div style={{textAlign:"center",padding:60,color:CO.mu}}>Loading all clubs from Google Sheets...</div>:
          view==="overview"?renderOverview():
          view==="top3"?renderTop3():
          view==="detail"?renderDetail():null
        }
      </div>
    </div>
  );
}
</script>
</body>
</html>
