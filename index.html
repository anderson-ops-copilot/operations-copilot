const HASH="Anderson_ASA_Operations";
function checkPw(){
  const v=document.getElementById("pw").value;
  if(v===HASH){document.getElementById("gate").style.display="none";document.getElementById("app-root").style.display="block";initApp()}

}

if(!window.storage){
  window.storage={
    async get(key){const v=localStorage.getItem("copilot_"+key);return v?{key,value:v}:null},
    async set(key,value){localStorage.setItem("copilot_"+key,value);return {key,value}},
    async delete(key){localStorage.removeItem("copilot_"+key);return {key,deleted:true}},
    async list(prefix){const keys=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith("copilot_"+prefix))keys.push(k.replace("copilot_",""))}return {keys}}
  };
}

const loadFromSheets=async(clubName)=>{
  try{
    const url=API+"?action=load&clubName="+encodeURIComponent(clubName);
    const res=await fetch(url,{redirect:"follow"});
    if(!res.ok)return null;
    const data=await res.json();
    if(data.state&&data.state.ci){
      setSheetsConnected(true);setSheetsStatus("Connected");
      return data.state;
    }
    if(data.state===null&&data.message){
      // Sheet exists but no saved state — check for prior year data
      setSheetsConnected(true);setSheetsStatus("Connected (new plan)");
      return data;
    }
    return null;
  }catch(e){console.log("Sheets load unavailable:",e.message);return null}
};

const saveToSheets=async(clubName,state)=>{
  if(!clubName||clubName==="__OTHER__")return;
  try{
    const url=API+"?action=save&clubName="+encodeURIComponent(clubName);
    await fetch(url,{method:"POST",redirect:"follow",headers:{"Content-Type":"text/plain"},body:JSON.stringify(state)});

// Normalize date values from Excel to YYYY-MM-DD format for <input type="date">
// Handles: Date objects, Excel serial numbers, MM/DD/YY, MM/DD/YYYY, M/D/YY, ISO strings, dashes
const normDate=v=>{
  if(v==null||v==="")return"";
  // Date object
  if(v instanceof Date&&!isNaN(v))return `${v.getFullYear()}-${String(v.getMonth()+1).padStart(2,"0")}-${String(v.getDate()).padStart(2,"0")}`;
  // Excel serial number
  if(typeof v==="number"&&v>1&&v<100000){
    const d=new Date((v-25569)*86400000);
    if(!isNaN(d))return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,"0")}-${String(d.getUTCDate()).padStart(2,"0")}`;
  }
  let s=String(v).trim();if(!s)return"";
  // Already ISO YYYY-MM-DD (or YYYY-MM-DDTHH...)
  if(/^\d{4}-\d{1,2}-\d{1,2}/.test(s)){const m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);return `${m[1]}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`}
  // MM/DD/YY, MM/DD/YYYY, M/D/YY (also handles dashes). 4-digit year tried first to avoid prefix match.
  const m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4}|\d{2})/);
  if(m){let [,mo,da,yr]=m;if(yr.length===2)yr=parseInt(yr)<50?"20"+yr:"19"+yr;return `${yr}-${mo.padStart(2,"0")}-${da.padStart(2,"0")}`}
  // Strip ordinal suffixes ("October 16th" -> "October 16") to make natural-language dates parseable
  s=s.replace(/(\d+)(st|nd|rd|th)/gi,"$1").trim();
  // Multi-date ("7 & 21 Oct"): split on & or / and take the first date
  if(/\s&\s/.test(s))s=s.split(/\s&\s/)[0].trim()+" "+(s.match(/(jan|feb|mar|apr|may|jun|jul|aug|sep|sept|oct|nov|dec)/i)?.[1]||"");
  // Week notation ("Oct W2" -> 2nd week of October, approx day 8-14, use day 11)
  const weekMatch=s.match(/^(jan|feb|mar|apr|may|jun|jul|aug|sep|sept|oct|nov|dec)\s+W(\d)/i);
  if(weekMatch){const mo=weekMatch[1];const wk=parseInt(weekMatch[2]);const day={1:4,2:11,3:18,4:25}[wk]||11;s=`${mo} ${day}`}
  // If no year present and string starts with a month name, infer from academic-year context: Sep-Dec=2026, Jan-Aug=2027
  const monthMatch=s.match(/^(jan|feb|mar|apr|may|jun|jul|aug|sep|sept|oct|nov|dec)/i);
  if(monthMatch&&!/\d{4}/.test(s)){const mo=monthMatch[1].toLowerCase().slice(0,3);const fallMonths=["sep","oct","nov","dec"];s+=fallMonths.includes(mo)?" 2026":" 2027"}
  // Last resort: JS Date.parse
  const d=new Date(s);
  if(!isNaN(d.getTime())&&d.getFullYear()>2020&&d.getFullYear()<2100)return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  return"";
};

      return{...EE,rank:rk>=0?stripRank(r[rk]):"",type:v(tc),name:v(nameIdx),description:v(dc),projectedDate:normDate(r[sd]),endDate:normDate(r[ed]),isNew:isY(nw),isCrossClub:isY(cc),includesSustainability:isY(su),clubPartner:v(cp),fundingSource:v(fs),expectedParticipants:num(ep),alumniAttending:isY(al),preferredVenue:v(pv),previousBudget:num(pb),forecastedBudget:num(fb),includesIE:isY(ie),additionalNotes:v(nt)};

/* ═══ ADMIN: Full Operating Plan Import ═══
   Parses all 6 tabs of the official ASA template (matches Mode A's export structure).
   Behind ?admin=1 query param. Always confirms before overwriting saved state. */
const parseFullPlan=async file=>{
  const data=await file.arrayBuffer();
  const wb=XLSX.read(data,{cellDates:true});
  const findSheet=(...keys)=>{const n=wb.SheetNames.find(name=>keys.some(k=>name.toLowerCase().includes(k.toLowerCase())));return n?wb.Sheets[n]:null};

    const stripRank=v=>{const s=String(v||"").replace(/^#/,"").trim();return ["1","2","3"].includes(s)?s:""};
    // Override the outer yn helper for events to also accept ✓ / ✔ / x marks
    const ynE=v=>{if(v==null||v==="")return false;if(v===true||v===1)return true;const s=String(v).toLowerCase().trim();return s==="yes"||s==="y"||s==="true"||s==="1"||s==="✓"||s==="✔"||s==="x"||s==="✅"};
    const parsed=rows.slice(hdrIdx+1).filter(r=>r[nameIdx]&&String(r[nameIdx]).trim()).map(r=>{
      const v=idx=>idx>=0&&r[idx]!=null?String(r[idx]):"";
      const num=idx=>{const s=v(idx).trim();return["-","--","tbd","n/a","na","tba"].includes(s.toLowerCase())?"":s};
      return{...EE,rank:rk>=0?stripRank(r[rk]):"",type:v(tc),name:v(nameIdx),description:v(dc),projectedDate:normDate(r[sd]),endDate:normDate(r[ed]),isNew:ynE(r[nw]),isCrossClub:ynE(r[cc]),includesSustainability:ynE(r[su]),clubPartner:v(cp),fundingSource:v(fs),expectedParticipants:num(ep),alumniAttending:ynE(r[al]),preferredVenue:v(pv),previousBudget:num(pb),forecastedBudget:num(fb),includesIE:ynE(r[ieCol]),additionalNotes:v(nt)};

  // ─── Tab 5: Board ───
  const s5=findSheet("board member","board","05");
  if(s5){

const handleFullPlanImport=async file=>{
  try{
    const parsed=await parseFullPlan(file);
    if(parsed.sheetsFound.length===0){
      setImportPreview({error:"No recognized tabs found. Expected: Club Information, Goals, Revenues, Events, Board, Parker."});
      return;
    }
    // Build per-section descriptions; null means the section wasn't in the file
    const memTotal=parsed.mem?Object.values(parsed.mem).reduce((s,v)=>s+(parseInt(v)||0),0):0;
    const sections={
      "Club Info":parsed.ci?`${parsed.ci.name||"?"}${parsed.ci.type?" ("+parsed.ci.type+")":""}`:null,
      "Goals":(parsed.priorGoals?.length||parsed.newGoals?.length||parsed.ie)?`${parsed.priorGoals?.length||0} prior, ${parsed.newGoals?.length||0} new${parsed.ie?", IE response":""}`:null,
      "Revenue":(parsed.mem||parsed.dues||parsed.rev)?`${memTotal} members, dues + outside revenue`:null,
      "Events":parsed.events?.length?`${parsed.events.length} events`:null,
      "Board":parsed.board?.length?`${parsed.board.length} members`:null,
      "Parker":parsed.parker?`${parsed.parker.liaison||"no liaison"}, ${parsed.parker.activities.filter(a=>a.vp||a.notes).length} activities filled`:null
    };
    setFullImportPending(parsed);
    setFullImportSummary({clubName:parsed.ci?.name||"(not specified)",sections});
    // Default: all found sections checked
    setSelectedSections(new Set(Object.keys(sections).filter(k=>sections[k]!==null)));
  }catch(err){console.error(err);setImportPreview({error:"Could not read file: "+String(err.message||err)})}
};

// Helper: does the current state have data in this section that would be overwritten?
const sectionHasExistingData=section=>{
  switch(section){
    case "Club Info":return !!ci.name;
    case "Goals":return newGoals.some(g=>g.goal.trim())||priorGoals.some(g=>g.goal.trim())||!!ie.trim();
    case "Revenue":return Object.values(mem).some(v=>parseInt(v)>0)||!!rev.lvo||!!rev.eventRevenue||!!rev.donations||!!rev.sponsorship||(Array.isArray(dues)&&dues.some(d=>d.fee||d.count));
    case "Events":return events.some(e=>e.name.trim());
    case "Board":return board.some(b=>b.name.trim())||boardConfirmed;
    case "Parker":return !!parkerLiaison.trim()||parkerActivities.some(a=>a.vp||a.notes)||!!parkerNotes.trim();
    default:return false;
  }
};

const applyFullPlan=(p,sections)=>{
  const has=name=>!sections||sections.has(name);
  if(has("Club Info")&&p.ci&&Object.keys(p.ci).length>0){
    setCi(prev=>{
      const merged={...prev,...p.ci};
      // Preserve user's dropdown selection so the dropdown stays selected
      // and saves go to the same bucket. The file's name may differ slightly
      // (whitespace, casing) and won't match the CL list exactly.
      if(prev.name&&prev.name!=="__OTHER__"){merged.name=prev.name}
      if(prev.type&&prev.name&&prev.name!=="__OTHER__"){merged.type=prev.type}
      return merged;
    });
  }
  if(has("Goals")){
    if(p.priorGoals&&p.priorGoals.length>0)setPriorGoals(p.priorGoals);
    if(p.newGoals&&p.newGoals.length>0)setNewGoals(p.newGoals);
    if(p.ie)setIe(p.ie);
  }
  if(has("Revenue")){
    if(p.mem)setMem(prev=>({...prev,...p.mem}));
    if(p.dues)setDues(p.dues);
    if(p.revPrior)setRevPrior(p.revPrior);
    if(p.rev)setRev(p.rev);
  }
  if(has("Events")&&p.events&&p.events.length>0){setEvents(p.events);setEventsChoice("prior")}
  if(has("Board")&&p.board&&p.board.length>0){setBoard(p.board);setBoardLoaded(true);setBoardConfirmed(true)}
  if(has("Parker")&&p.parker){
    if(p.parker.liaison)setParkerLiaison(p.parker.liaison);
    if(p.parker.tasks)setParkerTasks(p.parker.tasks);
    if(p.parker.activities)setParkerActivities(p.parker.activities);
    if(p.parker.matrix)setParkerMatrix(p.parker.matrix);
    if(p.parker.notes)setParkerNotes(p.parker.notes);
  }
  if(has("Club Info")&&p.ci?.externalBank&&!hasExtBank)setHasExtBank("bank");
  setPriorLoaded(true);
};

const toggleSection=name=>{
  setSelectedSections(prev=>{
    const next=new Set(prev);
    if(next.has(name))next.delete(name);else next.add(name);
    return next;
  });
};

  // Sheet 5: Board
  const s5=XLSX.utils.aoa_to_sheet([["Name","Role","Email","Parker-Club Liaison","Bylaws Liaison","LinkedIn","Full Time/FEMBA/Sig-O"],...board.filter(m=>m.name.trim()).map(m=>[m.name,m.role,m.email,m.parkerLiaison?"Yes":"",m.bylawsLiaison?"Yes":"",m.linkedin,m.memberType])]);
  s5["!cols"]=[{wch:25},{wch:30},{wch:35},{wch:14},{wch:14},{wch:40},{wch:18}];
  s5["!freeze"]={xSplit:0,ySplit:1};
  XLSX.utils.book_append_sheet(wb,s5,"05 - Board Member Info");
  
  // Sheet 6: Parker
  const pRows=[["Parker Club Operating Plan"],[""],["TASKS","Completed"],["Scheduled meeting",parkerTasks.meeting?"Yes":"No"],["Assigned Club liaison",parkerTasks.liaison?"Yes":"No"],["Agreed on template format unique to club operations",parkerTasks.template?"Yes":"No"],[""],["PLEASE COMPLETE STATEMENT BELOW"],["We confirm that we discussed this template with our Parker liaison, "+parkerLiaison+", and have agreed on a plan forward"],[""],["Activities","VP Responsible","Process and other notes"],...parkerActivities.map(a=>[a.activity,a.vp,a.notes]),[""],["Event Type","Primary Responsibility","Primary comm","Schedule event","Coord. & pay vendors/catering","Book rooms (EMS)","Recruit attendees / coaches"],...parkerMatrix.map(m=>[m.event,...PRC.map(c=>m[c])]),[""],["Additional Notes: "+parkerNotes]];
  const s6=XLSX.utils.aoa_to_sheet(pRows);
  s6["!cols"]=[{wch:40},{wch:25},{wch:25},{wch:15},{wch:22},{wch:15},{wch:22}];
  XLSX.utils.book_append_sheet(wb,s6,"06 - Parker Club Operating Plan");
  
  const out=XLSX.write(wb,{bookType:"xlsx",type:"base64"});
  const fname=(cname||"Club").replace(/\s+/g,"_")+"_Operating_Plan_2026-2027.xlsx";
  setDownloadUrl("data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,"+out);
  setDownloadName(fname);
  setExportDone(true)
};

{checks.map((c,i)=><div key={i} style={{fontSize:13,color:c.d?CO.gn:CO.rd}}>{c.d?"✅":"⬜"} {c.l}</div>)}</div></Cd>
<Cd title="Summary"><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:10}}>
{[{l:"Events",v:events.filter(e=>e.name.trim()).length},{l:"Members",v:totMem},{l:"Budget",v:"$"+totBudget.toLocaleString()},{l:"IE",v:events.filter(e=>e.includesIE).length},{l:"X-Club",v:events.filter(e=>e.isCrossClub).length},{l:"Board",v:board.filter(m=>m.name.trim()).length}].map((s,i)=>
<div key={i} style={{background:"rgba(255,255,255,0.05)",borderRadius:10,padding:"12px",textAlign:"center"}}>

{(mDOJ||mCN||mWAMO)&&<Cd style={{background:"rgba(217,79,79,0.08)",border:`1px solid rgba(217,79,79,0.3)`}}>

{mCN&&<p style={{margin:"0 0 4px",fontSize:13,color:CO.rd}}>• Missing: Career Night</p>}
{mWAMO&&<p style={{margin:"0 0 4px",fontSize:13,color:CO.rd}}>• Missing: WAMO/101</p>}</Cd>}
<Cd title="Top 3 Priority Events">{["1","2","3"].map(r=>
<div key={r} style={{padding:"8px 0",borderBottom:`1px solid ${CO.cr}`}}>
<span style={{fontWeight:800,color:CO.gd,marginRight:8}}>#{r}</span>
{getTop3(r)?<span style={{color:CO.wh}}>{getTop3(r).name} <span style={{color:CO.mu}}>— {getTop3(r).type} • {getTop3(r).projectedDate?(getTop3(r).endDate?getTop3(r).projectedDate+" – "+getTop3(r).endDate:getTop3(r).projectedDate):"TBD"}</span></span>:
<span style={{color:CO.rd,fontSize:13}}>Not assigned</span>}</div>)}</Cd></div>;

{!exportDone?
<Cd style={{textAlign:"center",padding:"40px 28px",background:`linear-gradient(135deg,${CO.nv},${CO.bl})`,border:`2px solid ${CO.gd}`}}>

<h2 style={{margin:"0 0 8px",color:CO.gd,fontSize:22}}>Export Operating Plan</h2>
<p style={{margin:"0 0 24px",color:CO.lt,fontSize:14}}>Generate your .xlsx with 6 sheet tabs matching the ASA template.</p>
<button onClick={handleExport} style={{...bb,background:CO.gd,color:CO.nv,fontSize:16,padding:"14px 36px"}}>Generate .xlsx</button>
<p style={{marginTop:16,fontSize:12,color:CO.mu}}>Completion: <strong style={{color:pct===100?CO.gn:CO.gd}}>{pct}%</strong></p></Cd>
:
<Cd style={{background:"rgba(61,170,109,0.1)",border:`2px solid ${CO.gn}`,padding:"30px 28px"}}>
<div style={{textAlign:"center",marginBottom:20}}><div style={{fontSize:40,marginBottom:8}}>✅</div>
<h2 style={{margin:0,color:CO.gn,fontSize:20}}>Ready to Download!</h2>
{downloadUrl&&<a href={downloadUrl} download={downloadName} style={{display:"inline-block",marginTop:16,padding:"14px 36px",borderRadius:8,background:CO.gd,color:CO.nv,fontWeight:700,fontSize:16,textDecoration:"none",fontFamily:"inherit"}}>⬇ Save {downloadName}</a>}
<p style={{margin:"12px 0 0",fontSize:12,color:CO.mu}}>Click the link above to save your file, then complete the steps below.</p>

<Ch label="I have reviewed the .xlsx and confirm it is accurate" checked={reviewConfirmed} onChange={setReviewConfirmed}/></div>
<div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
<div style={{width:28,height:28,borderRadius:"50%",background:uploadedToBox?CO.gn:"rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:CO.wh,fontWeight:700,flexShrink:0,marginTop:4}}>2</div>
<div><p style={{margin:"0 0 8px",fontSize:13,color:CO.lt}}>Upload to Box as: <strong style={{color:CO.gd}}>{(ci.name==="__OTHER__"?ci.otherType:ci.name)||"[Club]"} _ Operating Plan 2026-2027.xlsx</strong></p>
<button onClick={()=>window.open(BOX,"_blank")} style={{...bb,background:reviewConfirmed?CO.gd:"rgba(255,255,255,0.1)",color:reviewConfirmed?CO.nv:CO.mu}} disabled={!reviewConfirmed}>Open Box Folder</button></div></div>
<div style={{display:"flex",gap:12,alignItems:"center"}}>
<div style={{width:28,height:28,borderRadius:"50%",background:uploadedToBox?CO.gn:"rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:CO.wh,fontWeight:700,flexShrink:0}}>3</div>
<Ch label="I have uploaded to Box" checked={uploadedToBox} onChange={setUploadedToBox}/></div>
</div>
{uploadedToBox&&<div style={{marginTop:20,padding:16,background:"rgba(61,170,109,0.2)",borderRadius:10,textAlign:"center"}}>

<p style={{margin:"6px 0 0",fontSize:13,color:CO.lt}}>VP Operations will review and follow up.</p></div>}
</Cd>}
<Cd title="Re-generate">
<button onClick={()=>{setExportDone(false);setDownloadUrl(null)}} style={{...bb,background:"rgba(255,255,255,0.1)",color:CO.lt}}>Generate New .xlsx</button>
{downloadUrl&&<span style={{marginLeft:12}}><a href={downloadUrl} download={downloadName} style={{color:CO.gd,fontSize:13}}>⬇ Re-download current file</a></span>}
</Cd>
<Cd title="Reminders"><div style={{fontSize:13,color:CO.lt,lineHeight:1.8}}>

<p style={{margin:"0 0 4px"}}>Office hours: April 21 & 28, 11:30am–1pm</p>
<p style={{margin:"0 0 4px"}}>All revisions due: <strong style={{color:CO.gd}}>May 8, 5:00 PM</strong></p>
<p style={{margin:"0 0 4px"}}>Calendar review/approvals finalized: <strong style={{color:CO.gd}}>May 13</strong></p>
<p style={{margin:"0 0 4px"}}>Calendaring Session: <strong style={{color:CO.gd}}>May 19</strong></p>
<p style={{margin:0}}><strong>NO rooms booked before calendaring session</strong></p></div></Cd>

<div style={{display:"flex",alignItems:"flex-start",gap:16,flexWrap:"wrap"}}>
<div style={{fontSize:36,lineHeight:1}}>{submittedAt?"🔔":"📨"}</div>
<div style={{flex:"1 1 300px"}}>
<h3 style={{margin:"0 0 6px",fontSize:16,color:submittedAt?CO.gn:CO.gd}}>
{submittedAt?"Plan submitted for review":"Ready for VP Ops to review?"}
</h3>
{submittedAt?
<p style={{margin:"0 0 8px",fontSize:13,color:CO.lt,lineHeight:1.55}}>
You submitted this plan on <strong>{new Date(submittedAt).toLocaleString([],{dateStyle:"medium",timeStyle:"short"})}</strong>. Mallory has been notified and will review. You'll receive an email with either approval or specific feedback. <strong>If you make edits after getting feedback, click "Resubmit for Review" below so Mallory knows you're ready for another look</strong> — you don't need to email her separately.
</p>:
<p style={{margin:"0 0 8px",fontSize:13,color:CO.lt,lineHeight:1.55}}>
Click below when your plan is ready for Mallory (VP Ops) to review. This replaces the old "email Mallory when you're done" step — the reviewer dashboard will flag your submission automatically. You can still keep editing after submitting; just click Resubmit when you're ready for another review.
</p>}
{pct<70&&!submittedAt&&<p style={{margin:"0 0 10px",fontSize:12,color:CO.or,fontWeight:600}}>
⚠ Your plan is only {pct}% complete. We recommend getting to at least 70% before submitting, but you can submit anyway if you'd like early feedback.

{submittedAt?"↻ Resubmit for Review":"📨 Submit for Review"}
</button>
{submittedAt&&<button onClick={()=>{if(confirm("Withdraw this submission? Mallory's dashboard will no longer show your plan as submitted. You can resubmit anytime."))setSubmittedAt(null)}} style={{...bb,background:"rgba(255,255,255,0.08)",color:CO.mu,fontSize:12,padding:"8px 14px"}}>Withdraw</button>}
{submitJustClicked&&<span style={{fontSize:12,color:CO.gn,fontWeight:700}}>✓ Saved — Mallory has been notified</span>}
</div>
</div>
</div>
</Cd></div>;

<div><div style={{fontSize:15,fontWeight:700,color:CO.wh}}>Anderson Operating Plan Copilot</div>
<div style={{fontSize:11,color:CO.gd}}>Mode A — 2026-2027</div></div></div>
<div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2}}>

<div style={{width:`${pct}%`,height:"100%",borderRadius:3,background:pct===100?CO.gn:CO.gd,transition:"width 0.4s"}}/></div>
<div style={{fontSize:12,fontWeight:700,color:pct===100?CO.gn:CO.gd,marginTop:4}}>{pct}%</div></div>
<div style={{padding:"10px 16px",borderTop:`1px solid ${CO.cr}`}}>
<button onClick={()=>{if(window.confirm("Clear your browser data only? Google Sheets data will be kept.")){clearLocal();window.location.reload()}}} style={{padding:"8px 12px",borderRadius:8,border:"none",fontWeight:700,fontSize:11,cursor:"pointer",fontFamily:"inherit",background:"rgba(255,255,255,0.08)",color:CO.mu,width:"100%",marginBottom:6,position:"relative",zIndex:10}}>Clear Browser</button>
<button onClick={()=>{if(window.confirm("DELETE ALL DATA for this club? This clears BOTH browser AND Google Sheet. Cannot be undone.")){clearAll().then(()=>window.location.reload())}}} style={{padding:"8px 12px",borderRadius:8,border:"none",fontWeight:700,fontSize:11,cursor:"pointer",fontFamily:"inherit",background:"rgba(217,79,79,0.2)",color:CO.rd,width:"100%",position:"relative",zIndex:10}}>Full Reset</button></div>
</div>
<div style={{flex:1,padding:"24px 32px",overflowY:"auto",maxHeight:"calc(100vh - 60px)"}}>

<h1 style={{margin:"0 0 4px",fontSize:22,fontWeight:800,color:CO.wh}}>{STEPS[step].i} {STEPS[step].l}</h1>
<p style={{margin:0,fontSize:13,color:CO.mu}}>Step {step+1} of {STEPS.length}</p></div>
{renderers[step]()}
<div style={{display:"flex",justifyContent:"space-between",marginTop:28,paddingTop:20,borderTop:`1px solid ${CO.cr}`}}>
{step>0?<button onClick={()=>goTo(step-1)} style={{...bb,background:"rgba(255,255,255,0.1)",color:CO.lt}}>← Back</button>:<div/>}
{step<STEPS.length-1&&<button onClick={()=>goTo(step+1)} style={{...bb,background:CO.gd,color:CO.nv}}>Continue →</button>}</div>
</div></div></div></div>)}

  const root=ReactDOM.createRoot(document.getElementById("app-root"));

}
