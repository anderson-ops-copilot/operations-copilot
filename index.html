<script>
// Password check
const HASH="Anderson_ASA_Operations";
function checkPw(){
  const v=document.getElementById("pw").value;
  if(v===HASH){
    document.getElementById("gate").style.display="none";
    document.getElementById("app-root").style.display="block";
    initApp();
  } else {
    document.getElementById("pw-error").style.display="block";
  }
}
</script>

// Stub window.storage for browser persistence (same API as Claude artifacts)
if(!window.storage){
  window.storage={
    _data:{},
    async get(key){
      const v=localStorage.getItem("copilot_"+key);
      return v?{key,value:v}:null;
    },
    async set(key,value){
      localStorage.setItem("copilot_"+key,value);
      return {key,value};
    },
    async delete(key){
      localStorage.removeItem("copilot_"+key);
      return {key,deleted:true};
    },
    async list(prefix){
      const keys=[];
      for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        if(k.startsWith("copilot_"+prefix))keys.push(k.replace("copilot_",""));
      }
      return {keys};
    }
  };
}

const loadFromSheets=async(clubName)=>{
  try{
    const url=API+"?action=load&clubName="+encodeURIComponent(clubName);
    const res=await fetch(url,{redirect:"follow"});
    if(!res.ok)return null;
    const data=await res.json();
    if(data.state&&data.state.ci){
      setSheetsConnected(true);setSheetsStatus("Connected");
      return data.state;
    }
    if(data.state===null&&data.message){
      // Sheet exists but no saved state — check for prior year data
      setSheetsConnected(true);setSheetsStatus("Connected (new plan)");
      return data;
    }
    return null;
  }catch(e){console.log("Sheets load unavailable:",e.message);return null}
};

const saveToSheets=async(clubName,state)=>{
  if(!clubName||clubName==="__OTHER__")return;
  try{
    const url=API+"?action=save&clubName="+encodeURIComponent(clubName);
    await fetch(url,{method:"POST",redirect:"follow",headers:{"Content-Type":"text/plain"},body:JSON.stringify(state)});
    setSheetsConnected(true);
  }catch(e){console.log("Sheets save unavailable:",e.message)}
};

<div style={{width:28,height:28,borderRadius:"50%",background:uploadedToBox?CO.gn:"rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:CO.wh,fontWeight:700,flexShrink:0,marginTop:4}}>2</div>
<div><p style={{margin:"0 0 8px",fontSize:13,color:CO.lt}}>Upload to Box as: <strong style={{color:CO.gd}}>{(ci.name==="__OTHER__"?ci.otherType:ci.name)||"[Club]"} _ Operating Plan 2026-2027.xlsx</strong></p>
<button onClick={()=>window.open(BOX,"_blank")} style={{...bb,background:reviewConfirmed?CO.gd:"rgba(255,255,255,0.1)",color:reviewConfirmed?CO.nv:CO.mu}} disabled={!reviewConfirmed}>Open Box Folder</button></div></div>
<div style={{display:"flex",gap:12,alignItems:"center"}}>
<div style={{width:28,height:28,borderRadius:"50%",background:uploadedToBox?CO.gn:"rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:CO.wh,fontWeight:700,flexShrink:0}}>3</div>
<Ch label="I have uploaded to Box" checked={uploadedToBox} onChange={setUploadedToBox}/></div>
</div>
{uploadedToBox&&<div style={{marginTop:20,padding:16,background:"rgba(61,170,109,0.2)",borderRadius:10,textAlign:"center"}}>
<p style={{margin:0,fontSize:16,fontWeight:700,color:CO.gn}}>🎉 Submission Complete!</p>
<p style={{margin:"6px 0 0",fontSize:13,color:CO.lt}}>VP Operations will review and follow up.</p></div>}
</Cd>}
<Cd title="Re-generate">
<button onClick={()=>{setExportDone(false);setDownloadUrl(null)}} style={{...bb,background:"rgba(255,255,255,0.1)",color:CO.lt}}>Generate New .xlsx</button>
{downloadUrl&&<span style={{marginLeft:12}}><a href={downloadUrl} download={downloadName} style={{color:CO.gd,fontSize:13}}>⬇ Re-download current file</a></span>}
</Cd>
<Cd title="Reminders"><div style={{fontSize:13,color:CO.lt,lineHeight:1.8}}>
<p style={{margin:"0 0 4px"}}>Submit by <strong style={{color:CO.gd}}>April 24</strong> or <strong style={{color:CO.gd}}>May 1</strong></p>
<p style={{margin:"0 0 4px"}}>Office hours: April 21 & 28, 11:30am–1pm</p>
<p style={{margin:"0 0 4px"}}>Calendaring Session: <strong style={{color:CO.gd}}>May 19</strong></p>
<p style={{margin:0}}><strong>NO rooms booked before calendaring session</strong></p></div></Cd></div>;

const renderers=[rWelcome,rClubInfo,rBoard,rGoals,rRevenue,rEvents,rParker,rReview,rExport];

return(
<div style={{minHeight:"100vh",background:`linear-gradient(170deg,${CO.nv} 0%,${CO.dn} 40%,#001820 100%)`,fontFamily:"'Segoe UI','Helvetica Neue',sans-serif",color:CO.lt,display:"flex",flexDirection:"column"}}>
<div ref={topRef} style={{background:`linear-gradient(90deg,${CO.nv},${CO.bl})`,borderBottom:`3px solid ${CO.gd}`,padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
<div style={{display:"flex",alignItems:"center",gap:12}}>
<div style={{width:38,height:38,background:CO.gd,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:18,color:CO.nv,flexShrink:0}}>A</div>
<div><div style={{fontSize:15,fontWeight:700,color:CO.wh}}>Anderson Operating Plan Copilot</div>
<div style={{fontSize:11,color:CO.gd}}>Mode A — 2026-2027</div></div></div>
<div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2}}>
{lastSaved&&<div style={{fontSize:11,color:CO.mu}}>{saving?"Saving...":"Saved "+lastSaved}</div>}
{sheetsStatus&&<div style={{fontSize:10,color:sheetsConnected?CO.gn:CO.or}}>{sheetsConnected?"🟢":"🟡"} {sheetsStatus}</div>}
</div>
</div>
<div style={{display:"flex",flex:1,minHeight:0}}>
<div style={{width:190,flexShrink:0,background:"rgba(0,0,0,0.2)",borderRight:`1px solid ${CO.cr}`,padding:"16px 0",overflowY:"auto"}}>
{STEPS.map((s,i)=><div key={i} onClick={()=>goTo(i)} style={{padding:"10px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,background:i===step?"rgba(255,209,0,0.1)":"transparent",borderLeft:i===step?`3px solid ${CO.gd}`:"3px solid transparent"}}>
<span style={{fontSize:14}}>{s.i}</span><span style={{fontSize:12,fontWeight:i===step?700:400,color:i===step?CO.gd:CO.mu}}>{s.l}</span></div>)}
<div style={{padding:"14px 16px",marginTop:12,borderTop:`1px solid ${CO.cr}`}}>
<div style={{fontSize:11,color:CO.mu,marginBottom:6}}>Completion</div>
<div style={{width:"100%",height:6,borderRadius:3,background:"rgba(255,255,255,0.1)"}}>
<div style={{width:`${pct}%`,height:"100%",borderRadius:3,background:pct===100?CO.gn:CO.gd,transition:"width 0.4s"}}/></div>
<div style={{fontSize:12,fontWeight:700,color:pct===100?CO.gn:CO.gd,marginTop:4}}>{pct}%</div></div>
<div style={{padding:"10px 16px",borderTop:`1px solid ${CO.cr}`}}>
<button onClick={async()=>{if(confirm("Clear all saved data and start fresh?")){await resetSave();window.location.reload()}}} style={{...bb,padding:"6px 12px",fontSize:11,background:"rgba(217,79,79,0.15)",color:CO.rd,width:"100%"}}>Reset</button></div>
</div>
<div style={{flex:1,padding:"24px 32px",overflowY:"auto",maxHeight:"calc(100vh - 60px)"}}>
<div style={{maxWidth:860,margin:"0 auto"}}>
<div style={{marginBottom:20}}>
<h1 style={{margin:"0 0 4px",fontSize:22,fontWeight:800,color:CO.wh}}>{STEPS[step].i} {STEPS[step].l}</h1>
<p style={{margin:0,fontSize:13,color:CO.mu}}>Step {step+1} of {STEPS.length}</p></div>
{renderers[step]()}
<div style={{display:"flex",justifyContent:"space-between",marginTop:28,paddingTop:20,borderTop:`1px solid ${CO.cr}`}}>
{step>0?<button onClick={()=>goTo(step-1)} style={{...bb,background:"rgba(255,255,255,0.1)",color:CO.lt}}>← Back</button>:<div/>}
{step<STEPS.length-1&&<button onClick={()=>goTo(step+1)} style={{...bb,background:CO.gd,color:CO.nv}}>Continue →</button>}</div>
</div></div></div></div>)}


function initApp(){
  const root=ReactDOM.createRoot(document.getElementById("app-root"));
  root.render(React.createElement(App));
}
</script>
</body>
</html>
